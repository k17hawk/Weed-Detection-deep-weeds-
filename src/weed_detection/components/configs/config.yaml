artifacts_root: artifacts

# ── Kafka ─────────────────────────────────────────────────────────────────────
kafka:
  bootstrap_servers : localhost:9092
  topic             : drone-images-topic
  consumer_group    : drone-group

data_ingestion:
  root_dir             : artifacts/data_ingestion
  kafka_data_dir       : artifacts/data_ingestion/kafka_data        # valid zips land here
  bad_raw_data_dir     : artifacts/data_ingestion/bad_raw_data      # invalid filenames quarantined
  unzip_dir            : artifacts/data_ingestion/unzipped          # extracted zip contents
  normalized_dir       : artifacts/data_ingestion/normalized        # versioned normalized data
  local_data_file      : artifacts/data_ingestion/kafka_data/latest_artifact.json
  artifact_path        : artifacts/data_ingestion/data_ingestion_artifact.json
  ingestion_state_path : artifacts/data_ingestion/ingestion_state.json  # tracks last processed version
