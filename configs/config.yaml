artifacts_root: artifacts

# ── Kafka ─────────────────────────────────────────────────────────────────────
kafka:
  bootstrap_servers : localhost:9092
  topic             : drone-images-topic
  consumer_group    : drone-group

# ── Data Ingestion ────────────────────────────────────────────────────────────
data_ingestion:
  root_dir             : artifacts/data_ingestion
  kafka_data_dir       : artifacts/data_ingestion/kafka_data
  bad_raw_data_dir     : artifacts/data_ingestion/bad_raw_data
  unzip_dir            : artifacts/data_ingestion/unzipped
  normalized_dir       : artifacts/data_ingestion/normalized
  local_data_file      : artifacts/data_ingestion/kafka_data/latest_artifact.json
  artifact_path        : artifacts/data_ingestion/data_ingestion_artifact.json
  ingestion_state_path : artifacts/data_ingestion/ingestion_state.json

# ── Data Validation ───────────────────────────────────────────────────────────
data_validation:
  root_dir                : artifacts/data_validation
  ingestion_artifact_path : artifacts/data_ingestion/data_ingestion_artifact.json
  validation_report_path  : artifacts/data_validation/validation_report.json
  validation_state_path   : artifacts/data_validation/validation_state.json
  valid_label_min         : 0
  valid_label_max         : 8
  imbalance_threshold     : 0.01
  missing_file_threshold  : 0.05

# ── Data Transformation ───────────────────────────────────────────────────────
data_transformation:
  root_dir                  : artifacts/data_transformation
  class_weights_path        : artifacts/data_transformation/class_weights.json
  transform_config_path     : artifacts/data_transformation/transform_config.json
  artifact_path             : artifacts/data_transformation/data_transformation_artifact.json
  transformation_state_path : artifacts/data_transformation/transformation_state.json

# ── Model Trainer ─────────────────────────────────────────────────────────────
model_trainer:
  root_dir              : artifacts/model_trainer
  checkpoints_dir       : artifacts/model_trainer/checkpoints
  best_model_path       : artifacts/model_trainer/best_model.pth
  final_model_path      : artifacts/model_trainer/final_model.pth
  training_history_path : artifacts/model_trainer/training_history.json
  mlflow_db_path        : artifacts/model_trainer/mlflow.db   # local sqlite for MLflow
  artifact_path         : artifacts/model_trainer/model_trainer_artifact.json
  trainer_state_path    : artifacts/model_trainer/trainer_state.json

# ── Model Registry ────────────────────────────────────────────────────────────
model_registry:
  root_dir               : artifacts/model_registry
  champion_dir           : artifacts/model_registry/champion
  champion_model_path    : artifacts/model_registry/champion/model.pth
  champion_metadata_path : artifacts/model_registry/champion/champion_metadata.json
  runs_dir               : artifacts/model_registry/runs

# ── Model Evaluation ─────────────────────────────────────────────────────────
model_evaluation:
  root_dir                 : artifacts/model_evaluation
  evaluation_report_path   : artifacts/model_evaluation/evaluation_report.json
  evaluation_history_path  : artifacts/model_evaluation/evaluation_history.json
  evaluation_state_path    : artifacts/model_evaluation/evaluation_state.json
  artifact_path            : artifacts/model_evaluation/model_evaluation_artifact.json
  promotion_metric         : weighted_f1
  min_promotion_threshold  : 0.80

# ── Model Export ──────────────────────────────────────────────────────────────
model_export:
  root_dir              : artifacts/model_export
  exports_dir           : artifacts/model_export/exports
  onnx_model_path       : artifacts/model_export/exports/model.onnx
  onnx_fp16_model_path  : artifacts/model_export/exports/model_fp16.onnx
  model_info_path       : artifacts/model_export/exports/model_info.json
  export_state_path     : artifacts/model_export/export_state.json
  artifact_path         : artifacts/model_export/model_export_artifact.json